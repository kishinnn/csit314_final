apiVersion: apps/v1
kind: Deployment
metadata:
  name: helloworld-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helloworld
  template:
    metadata:
      labels:
        app: helloworld
    spec:
      containers:
      - name: helloworld-container
        image: helloworld-app:latest
        imagePullPolicy: Never # Uses local minikube docker daemon images
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: mysql-config